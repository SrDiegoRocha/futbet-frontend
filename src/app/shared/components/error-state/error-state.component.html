<div class="error-state" role="alert">
  <span class="error-state__icon" aria-hidden="true">
    <lucide-icon [img]="alertIcon" [size]="20" />
  </span>
  <div class="error-state__body">
    <h3 class="error-state__title">{{ title() }}</h3>
    @if (message()) {
      <p class="error-state__message">{{ message() }}</p>
    }
  </div>
  @if (canRetry()) {
    <button
      type="button"
      class="error-state__retry"
      [disabled]="retrying()"
      (click)="onRetry()"
    >
      <lucide-icon
        class="error-state__retry-icon"
        [class.error-state__retry-icon--spinning]="retrying()"
        [img]="refreshIcon"
        [size]="14"
      />
      {{ retryLabel() }}
    </button>
  }
</div>
