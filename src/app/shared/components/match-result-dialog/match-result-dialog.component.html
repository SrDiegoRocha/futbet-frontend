@if (open() && match(); as m) {
  <div class="dialog" role="dialog" aria-modal="true" [attr.aria-label]="title()">
    <div
      class="dialog__backdrop"
      (click)="onBackdropClick()"
      aria-hidden="true"
      @backdropFade
    ></div>
    <div class="dialog__content" role="document" @modalScale>
      <header class="dialog__header">
        <h2 class="dialog__title">{{ title() }}</h2>
        <p class="dialog__subtitle">
          {{ m.homeTeam.name }} × {{ m.awayTeam.name }}
        </p>
      </header>

      <div class="score">
        <div class="score__side">
          <app-team-badge
            [name]="m.homeTeam.name"
            [shortName]="m.homeTeam.shortName"
            [badgeUrl]="m.homeTeam.badgeUrl"
            [size]="44"
          />
          <span class="score__team">{{ m.homeTeam.name }}</span>
          <div class="stepper">
            <button
              type="button"
              class="stepper__btn"
              [disabled]="submitting() || homeScore() <= 0"
              [attr.aria-label]="'Diminuir placar de ' + m.homeTeam.name"
              (click)="decHome()"
            >
              <lucide-icon [img]="minusIcon" [size]="18" />
            </button>
            <input
              type="number"
              class="stepper__input"
              inputmode="numeric"
              min="0"
              max="99"
              [value]="homeScore()"
              [disabled]="submitting()"
              [attr.aria-label]="'Placar de ' + m.homeTeam.name"
              (input)="onHomeInput($event)"
            />
            <button
              type="button"
              class="stepper__btn"
              [disabled]="submitting() || homeScore() >= 99"
              [attr.aria-label]="'Aumentar placar de ' + m.homeTeam.name"
              (click)="incHome()"
            >
              <lucide-icon [img]="plusIcon" [size]="18" />
            </button>
          </div>
        </div>

        <span class="score__sep" aria-hidden="true">×</span>

        <div class="score__side">
          <app-team-badge
            [name]="m.awayTeam.name"
            [shortName]="m.awayTeam.shortName"
            [badgeUrl]="m.awayTeam.badgeUrl"
            [size]="44"
          />
          <span class="score__team">{{ m.awayTeam.name }}</span>
          <div class="stepper">
            <button
              type="button"
              class="stepper__btn"
              [disabled]="submitting() || awayScore() <= 0"
              [attr.aria-label]="'Diminuir placar de ' + m.awayTeam.name"
              (click)="decAway()"
            >
              <lucide-icon [img]="minusIcon" [size]="18" />
            </button>
            <input
              type="number"
              class="stepper__input"
              inputmode="numeric"
              min="0"
              max="99"
              [value]="awayScore()"
              [disabled]="submitting()"
              [attr.aria-label]="'Placar de ' + m.awayTeam.name"
              (input)="onAwayInput($event)"
            />
            <button
              type="button"
              class="stepper__btn"
              [disabled]="submitting() || awayScore() >= 99"
              [attr.aria-label]="'Aumentar placar de ' + m.awayTeam.name"
              (click)="incAway()"
            >
              <lucide-icon [img]="plusIcon" [size]="18" />
            </button>
          </div>
        </div>
      </div>

      @if (serverError(); as err) {
        <p class="dialog__error" role="alert">{{ err }}</p>
      }

      <div class="dialog__actions">
        <app-button
          variant="ghost"
          size="md"
          [disabled]="submitting()"
          (buttonClick)="onCancel()"
        >
          Cancelar
        </app-button>
        <app-button
          variant="primary"
          size="md"
          [loading]="submitting()"
          (buttonClick)="onConfirm()"
        >
          {{ confirmLabel() }}
        </app-button>
      </div>
    </div>
  </div>
}
