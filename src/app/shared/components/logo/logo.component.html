<div
  class="logo"
  [class.logo--lockup]="variant() === 'lockup'"
  role="img"
  [attr.aria-label]="ariaLabel()"
  [style.--logo-size]="symbolPx()"
  [style.--logo-wordmark-size]="wordmarkPx()"
  [style.--logo-gap]="gapPx()"
>
  @if (showIcon()) {
    <!--
      Placeholder logo symbol. Substitua o SVG abaixo pelo arquivo final mantendo
      o atributo class="logo__symbol" e o viewBox 0 0 64 64 para o sizing continuar.
    -->
    <svg
      class="logo__symbol"
      viewBox="0 0 64 64"
      xmlns="http://www.w3.org/2000/svg"
      aria-hidden="true"
      focusable="false"
    >
      <circle cx="32" cy="32" r="30" fill="var(--brand)" />
      <polygon
        points="32,17 44,26 40,40 24,40 20,26"
        fill="var(--text-on-brand)"
      />
      <path
        d="M32 6 L32 17 M44 26 L54 19 M40 40 L48 50 M24 40 L16 50 M20 26 L10 19"
        stroke="var(--text-on-brand)"
        stroke-width="2.5"
        stroke-linecap="round"
        fill="none"
      />
    </svg>
  }
  @if (showWordmark()) {
    <span class="logo__wordmark" aria-hidden="true">
      <span class="logo__wordmark-fut">Fut</span><span
        class="logo__wordmark-bet"
        >Bet</span
      >
    </span>
  }
</div>
