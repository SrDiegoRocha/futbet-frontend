<section class="page">
  <app-page-header
    title="Nova partida"
    [subtitle]="phase()?.name ?? ''"
    [backTo]="backToHref()"
  />

  @if (loading()) {
    <div class="page__skeleton">
      <div class="u-skeleton page__skeleton-line"></div>
      <div class="u-skeleton page__skeleton-line"></div>
      <div class="u-skeleton page__skeleton-line"></div>
    </div>
  } @else if (loadError(); as err) {
    <div class="page__error" role="alert">
      <p class="page__error-text">{{ err }}</p>
      <app-button variant="brand-outline" size="md" (buttonClick)="cancel()">
        Voltar
      </app-button>
    </div>
  } @else if (phase(); as p) {
    @if (phaseTeams().length < 2) {
      <div class="page__warning" role="alert">
        Esta fase precisa de pelo menos 2 times para criar partidas. Adicione
        times antes de criar uma partida.
      </div>
    } @else {
      <app-match-form
        mode="create"
        [phaseType]="p.phaseType"
        [phaseTeams]="phaseTeams()"
        [groups]="groups()"
        [tournamentStatus]="tournamentStatus()"
        [submitting]="submitting()"
        [serverError]="serverError()"
        (saveForm)="save($event)"
        (cancelForm)="cancel()"
      />
    }
  }
</section>
