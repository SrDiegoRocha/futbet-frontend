<section class="page">
  <app-page-header
    title="Editar partida"
    [subtitle]="phase()?.name ?? ''"
    [backTo]="backToHref()"
  />

  @if (loading()) {
    <div class="page__skeleton">
      <div class="u-skeleton page__skeleton-line"></div>
      <div class="u-skeleton page__skeleton-line"></div>
      <div class="u-skeleton page__skeleton-line"></div>
    </div>
  } @else if (loadError(); as err) {
    <div class="page__error" role="alert">
      <p class="page__error-text">{{ err }}</p>
      <app-button variant="brand-outline" size="md" (buttonClick)="cancel()">
        Voltar
      </app-button>
    </div>
  } @else if (phase(); as p) {
    @if (match(); as m) {
      <app-match-form
        [initial]="m"
        mode="edit"
        [phaseType]="p.phaseType"
        [phaseTeams]="phaseTeams()"
        [groups]="groups()"
        [tournamentStatus]="tournamentStatus()"
        [matchStatus]="m.status"
        [submitting]="submitting()"
        [serverError]="serverError()"
        (saveForm)="save($event)"
        (cancelForm)="cancel()"
      />
    }
  }
</section>
